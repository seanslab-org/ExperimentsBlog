<svg viewBox="0 0 1120 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Audio is transcribed on your Mac; only text crosses to SnapGPU, which summarizes and erases it.">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#6B8AB8"/></marker>
    <marker id="arb" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#5B9279"/></marker>
  </defs>
  <rect width="1120" height="430" fill="#FFFFFF"/>

  <!-- LEFT: YOUR MAC -->
  <g transform="translate(60,70)">
    <rect x="0" y="0" width="420" height="290" rx="16" fill="#eef4f0" stroke="#cfe1d6" stroke-width="1.5"/>
    <text x="24" y="36" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" font-weight="600" letter-spacing="2" fill="#5B9279">YOUR MAC</text>
    <text x="24" y="58" font-family="-apple-system,system-ui,sans-serif" font-size="11.5" fill="#7d9a8a">everything here happens locally</text>

    <rect x="24" y="80" width="372" height="74" rx="10" fill="#ffffff" stroke="#cfe1d6"/>
    <g transform="translate(46,117)">
      <rect x="0"  y="-12" width="4" height="24" rx="2" fill="#5B9279"/>
      <rect x="9"  y="-20" width="4" height="40" rx="2" fill="#5B9279"/>
      <rect x="18" y="-7"  width="4" height="14" rx="2" fill="#5B9279"/>
      <rect x="27" y="-17" width="4" height="34" rx="2" fill="#5B9279"/>
      <rect x="36" y="-10" width="4" height="20" rx="2" fill="#5B9279"/>
      <rect x="45" y="-22" width="4" height="44" rx="2" fill="#5B9279"/>
      <rect x="54" y="-9"  width="4" height="18" rx="2" fill="#5B9279"/>
    </g>
    <text x="118" y="112" font-family="-apple-system,system-ui,sans-serif" font-size="14.5" font-weight="600" fill="#1F1F1E">Your recording</text>
    <text x="118" y="132" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" fill="#7d9a8a">from your HiDock</text>

    <line x1="210" y1="160" x2="210" y2="188" stroke="#5B9279" stroke-width="2" marker-end="url(#arb)"/>

    <rect x="24" y="196" width="372" height="74" rx="10" fill="#ffffff" stroke="#cfe1d6"/>
    <text x="48" y="228" font-family="-apple-system,system-ui,sans-serif" font-size="14.5" font-weight="600" fill="#1F1F1E">Transcribed on your Mac</text>
    <text x="48" y="250" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" fill="#7d9a8a">speech → text, right on your machine</text>
  </g>

  <!-- MIDDLE -->
  <g transform="translate(540,70)">
    <line x1="0" y1="-6" x2="0" y2="296" stroke="#cdcabf" stroke-width="2" stroke-dasharray="3 6"/>
    <line x1="-58" y1="120" x2="60" y2="120" stroke="#6B8AB8" stroke-width="2.5" marker-end="url(#ar)"/>
    <rect x="-32" y="98" width="50" height="22" rx="6" fill="#eef1f6" stroke="#d6def0"/>
    <text x="-7" y="113" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5d77a0">text</text>
    <line x1="60" y1="176" x2="-58" y2="176" stroke="#6B8AB8" stroke-width="2.5" marker-end="url(#ar)"/>
    <rect x="-44" y="184" width="74" height="22" rx="6" fill="#eef1f6" stroke="#d6def0"/>
    <text x="-7" y="199" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5d77a0">summary</text>
    <g transform="translate(20,238)">
      <circle cx="0" cy="0" r="11" fill="none" stroke="#c97070" stroke-width="2"/>
      <line x1="-7.8" y1="7.8" x2="7.8" y2="-7.8" stroke="#c97070" stroke-width="2"/>
      <text x="0" y="32" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600" fill="#b85f5f">audio never crosses</text>
    </g>
  </g>

  <!-- RIGHT: SNAPGPU -->
  <g transform="translate(640,70)">
    <rect x="0" y="0" width="420" height="290" rx="16" fill="#eef1f6" stroke="#d2dbef" stroke-width="1.5"/>
    <text x="24" y="36" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" font-weight="600" letter-spacing="2" fill="#6B8AB8">SNAPGPU · EPHEMERAL CLOUD</text>
    <text x="24" y="58" font-family="-apple-system,system-ui,sans-serif" font-size="11.5" fill="#8694b5">wakes for your request, then disappears</text>

    <rect x="24" y="80" width="372" height="74" rx="10" fill="#ffffff" stroke="#d2dbef"/>
    <text x="48" y="112" font-family="-apple-system,system-ui,sans-serif" font-size="14.5" font-weight="600" fill="#1F1F1E">Summarize in memory</text>
    <text x="48" y="134" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" fill="#8694b5">reads the text, writes a short summary</text>

    <line x1="210" y1="160" x2="210" y2="188" stroke="#6B8AB8" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="24" y="196" width="372" height="74" rx="10" fill="#ffffff" stroke="#d2dbef"/>
    <text x="48" y="228" font-family="-apple-system,system-ui,sans-serif" font-size="14.5" font-weight="600" fill="#1F1F1E">Erase everything</text>
    <text x="48" y="250" font-family="-apple-system,system-ui,sans-serif" font-size="12.5" fill="#8694b5">nothing stored · nothing logged</text>
  </g>
</svg>
