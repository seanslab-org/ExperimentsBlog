<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Docknote by HiDock — Your Private Meeting Intelligence. Audio stays on your Mac, only text travels.">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1bbfcb"/>
      <stop offset="1" stop-color="#0097a7"/>
    </linearGradient>
    <marker id="hx" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#6B8AB8"/></marker>
  </defs>

  <rect width="1200" height="600" fill="#F7F5EF"/>
  <rect x="0" y="0" width="10" height="600" fill="url(#teal)"/>

  <!-- brand -->
  <g transform="translate(80,72)">
    <rect x="0" y="-15" width="20" height="20" rx="6" fill="url(#teal)"/>
    <text x="34" y="1" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="600" fill="#1F1F1E">Docknote</text>
    <text x="140" y="1" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="400" fill="#8a887f">by HiDock</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="190" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600" letter-spacing="3" fill="#0097a7">NOW IN EARLY ACCESS ALPHA</text>

  <!-- headline -->
  <text x="78" y="262" font-family="-apple-system,system-ui,sans-serif" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#1F1F1E">Your Private</text>
  <text x="78" y="328" font-family="-apple-system,system-ui,sans-serif" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#1F1F1E">Meeting Intelligence.</text>

  <!-- subhead -->
  <text x="80" y="384" font-family="-apple-system,system-ui,sans-serif" font-size="23" font-weight="400" fill="#5b5a54">Audio stays on your Mac. Only text travels —</text>
  <text x="80" y="416" font-family="-apple-system,system-ui,sans-serif" font-size="23" font-weight="400" fill="#5b5a54">and only for the moment it takes to summarize.</text>

  <!-- split motif -->
  <g transform="translate(80,486)">
    <rect x="0" y="0" width="190" height="56" rx="14" fill="#eef4f0" stroke="#cfe1d6" stroke-width="1.5"/>
    <g transform="translate(26,28)">
      <rect x="0"  y="-9"  width="3.5" height="18" rx="1.75" fill="#5B9279"/>
      <rect x="7"  y="-15" width="3.5" height="30" rx="1.75" fill="#5B9279"/>
      <rect x="14" y="-5"  width="3.5" height="10" rx="1.75" fill="#5B9279"/>
      <rect x="21" y="-13" width="3.5" height="26" rx="1.75" fill="#5B9279"/>
      <rect x="28" y="-7"  width="3.5" height="14" rx="1.75" fill="#5B9279"/>
    </g>
    <text x="66" y="33" font-family="-apple-system,system-ui,sans-serif" font-size="16" font-weight="600" fill="#3f3e39">Your Mac</text>

    <line x1="206" y1="28" x2="266" y2="28" stroke="#6B8AB8" stroke-width="2.5" marker-end="url(#hx)"/>
    <rect x="216" y="6" width="44" height="22" rx="6" fill="#eef1f6" stroke="#d6def0"/>
    <text x="238" y="21" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5d77a0">text</text>

    <rect x="282" y="0" width="240" height="56" rx="14" fill="#eef1f6" stroke="#d2dbef" stroke-width="1.5"/>
    <text x="308" y="33" font-family="-apple-system,system-ui,sans-serif" font-size="16" font-weight="600" fill="#3f3e39">SnapGPU · summarize &amp; erase</text>
  </g>
</svg>
