<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#c4453d"/>
    </marker>
  </defs>
  <rect width="1200" height="480" fill="#fbfbf9"/>

  <text x="600" y="48" text-anchor="middle" font-size="11" fill="#888" letter-spacing="5">SEANSLAB · SEEING THE WORLD THROUGH INFORMATION THEORY</text>

  <text x="600" y="108" text-anchor="middle" font-size="30" font-weight="700" fill="#1a1a1a">Software Engineering: From Bit-Exact to LLM Probability</text>
  <text x="600" y="148" text-anchor="middle" font-size="20" font-weight="600" fill="#c4453d">What, exactly, changed?</text>

  <line x1="500" y1="172" x2="700" y2="172" stroke="#c4453d" stroke-width="1.5"/>

  <!-- 2002 layer -->
  <g transform="translate(150, 230)">
    <text x="150" y="0" text-anchor="middle" font-size="13" fill="#888" font-weight="500" letter-spacing="2">2002 · application layer</text>
    <rect x="0" y="20" width="300" height="80" fill="#fff" stroke="#888" stroke-width="1.5"/>
    <text x="150" y="50" text-anchor="middle" font-size="13" fill="#555">GSM-EFR codec · ADI 218x assembly</text>
    <rect x="60" y="60" width="180" height="32" fill="#1a1a1a"/>
    <text x="150" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#c4453d" letter-spacing="2">BIT-EXACT</text>
    <text x="150" y="120" text-anchor="middle" font-size="10" fill="#888" font-style="italic">every sample bit-exact to the ITU reference</text>
  </g>

  <!-- leveled-up arrow -->
  <g transform="translate(610, 280)">
    <line x1="0" y1="20" x2="80" y2="20" stroke="#c4453d" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="45" y="10" text-anchor="middle" font-size="13" fill="#c4453d" font-weight="700">leveled up</text>
    <text x="45" y="40" text-anchor="middle" font-size="10" fill="#c4453d" font-style="italic">didn't vanish</text>
  </g>

  <!-- 2026 layer -->
  <g transform="translate(730, 230)">
    <text x="150" y="0" text-anchor="middle" font-size="13" fill="#c4453d" font-weight="500" letter-spacing="2">2026 · harness layer</text>
    <rect x="0" y="20" width="300" height="80" fill="#fff" stroke="#c4453d" stroke-width="1.5"/>
    <text x="150" y="50" text-anchor="middle" font-size="13" fill="#555">LangSmith · eval pipeline</text>
    <rect x="60" y="60" width="180" height="32" fill="#1a1a1a"/>
    <text x="150" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#c4453d" letter-spacing="2">BIT-EXACT</text>
    <text x="150" y="120" text-anchor="middle" font-size="10" fill="#888" font-style="italic">every trace · every prompt version · every eval</text>
  </g>

  <text x="600" y="430" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">Bit-exact didn't die — it moved from the application layer up to the harness layer</text>
  <text x="600" y="455" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Two eras in one chip-algorithm engineer's career · Sean · seanslab.org</text>
</svg>
