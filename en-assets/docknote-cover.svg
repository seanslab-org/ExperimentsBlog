<svg width="1600" height="600" viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Docknote by HiDock — be in the meeting, let it remember.">
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="46%">
      <stop offset="0" stop-color="#1bbfcb" stop-opacity="0.13"/>
      <stop offset="0.6" stop-color="#1bbfcb" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#1bbfcb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1bbfcb"/>
      <stop offset="1" stop-color="#0097a7"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="#F7F5EF"/>
  <rect width="1600" height="600" fill="url(#glow)"/>

  <!-- centered lockup, all within the crop-safe core -->
  <rect x="785" y="182" width="30" height="30" rx="9" fill="url(#teal)"/>

  <text x="800" y="280" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="56" font-weight="600" letter-spacing="-1" fill="#1F1F1E">Docknote</text>
  <text x="800" y="312" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="400" letter-spacing="0.5" fill="#8a887f">by HiDock</text>

  <line x1="772" y1="346" x2="828" y2="346" stroke="#1bbfcb" stroke-width="2"/>

  <text x="800" y="392" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="25" font-weight="400" fill="#5b5a54">Be in the meeting. Let it remember.</text>
</svg>
